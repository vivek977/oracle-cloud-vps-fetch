name: OCI SOCKS5 Instance Retry

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # also allows manual trigger

concurrency:
  group: oci-retry
  cancel-in-progress: false   # skip new trigger if a run is already active

jobs:
  launch:
    runs-on: ubuntu-latest

    steps:
      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY }}
          region=us-chicago-1
          key_file=/home/runner/.oci/key.pem
          EOF

      - name: Check running instances
        id: check
        run: |
          RAW=$(oci compute instance list \
            --compartment-id "${{ secrets.OCI_TENANCY }}" \
            --lifecycle-state RUNNING 2>/dev/null || echo '{"data":[]}')
          COUNT=$(echo "$RAW" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(len([i for i in d.get('data',[]) if i.get('display-name','').startswith('oraclecloud6gb')]))" 2>/dev/null || echo "0")
          COUNT=${COUNT:-0}
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Running SOCKS5 instances: $COUNT / 2 target"

      - name: Try all ADs
        if: steps.check.outputs.count != '2'
        run: |
          CURRENT=${{ steps.check.outputs.count }}
          CURRENT=${CURRENT:-0}
          NEEDED=$((2 - CURRENT))
          echo "Need to create $NEEDED more instance(s)..."

          for i in $(seq 1 $NEEDED); do
            NEXT=$((CURRENT + i))
            NAME="oraclecloud6gb${NEXT}"
            echo "--- Creating $NAME ---"
            CREATED=false
            for AD in "RIZS:US-CHICAGO-1-AD-1" "RIZS:US-CHICAGO-1-AD-2" "RIZS:US-CHICAGO-1-AD-3"; do
              echo "$(date) — trying $AD for $NAME..."
              RESULT=$(oci compute instance launch \
                --availability-domain "$AD" \
                --compartment-id "${{ secrets.OCI_TENANCY }}" \
                --shape "VM.Standard.A1.Flex" \
                --shape-config '{"ocpus":1,"memoryInGBs":6}' \
                --image-id "${{ secrets.OCI_IMG }}" \
                --subnet-id "${{ secrets.OCI_SUBNET }}" \
                --assign-public-ip true \
                --display-name "$NAME" \
                --ssh-authorized-keys-file <(echo "${{ secrets.OCI_SSH_KEY }}") 2>&1) || true

              if echo "$RESULT" | grep -q "Out of host capacity\|InternalError"; then
                echo "No capacity in $AD"
              else
                echo "========================================="
                echo "  $NAME CREATED SUCCESSFULLY!"
                echo "========================================="
                echo "$RESULT"
                CREATED=true
                break
              fi
            done
            if [ "$CREATED" = false ]; then
              echo "All ADs full for $NAME — will retry in 10 minutes."
            fi
          done

      - name: All done
        if: steps.check.outputs.count == '2'
        run: echo "Both instances running. Disable this workflow."
